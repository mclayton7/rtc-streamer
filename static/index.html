<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTC Streamer - Live Video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>RTC Streamer</h1>
            <div id="status" class="status disconnected">Disconnected</div>
        </header>

        <main>
            <div class="video-container">
                <video id="videoPlayer" autoplay playsinline controls muted></video>
                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <p>Connecting...</p>
                </div>
            </div>

            <div class="controls">
                <button id="connectBtn" class="btn btn-primary">Connect</button>
                <button id="disconnectBtn" class="btn btn-secondary" disabled>Disconnect</button>
            </div>

            <div class="stats" id="stats">
                <h3>Connection Stats</h3>
                <div class="stats-grid">
                    <div class="stat">
                        <span class="stat-label">Status:</span>
                        <span id="connStatus">Disconnected</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Bitrate:</span>
                        <span id="bitrate">0 kbps</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Packets Lost:</span>
                        <span id="packetsLost">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Latency:</span>
                        <span id="latency">0 ms</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Ultra-low latency WebRTC streaming</p>
        </footer>
    </div>

    <script src="player.js"></script>
</body>
</html>
